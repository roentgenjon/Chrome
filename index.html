<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Remote Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #202124;
      --surface: #2d2e31;
      --border: #3c3f43;
      --accent: #8ab4f8;
      --text: #e8eaed;
      --text-dim: #9aa0a6;
      --red: #f28b82;
      --green: #81c995;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    #toolbar svg { flex-shrink: 0; }

    #title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .spacer { flex: 1; }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s;
      flex-shrink: 0;
    }
    #status-dot.connected { background: var(--green); }
    #status-dot.error     { background: var(--red); }

    #status-text {
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #btn-settings {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    #btn-settings:hover { color: var(--text); border-color: var(--accent); }

    /* ── Connect overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(4px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: min(400px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card h1 {
      font-size: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--text-dim); }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    #btn-connect {
      background: var(--accent);
      color: #202124;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    #btn-connect:hover { opacity: .9; }
    #btn-connect:disabled { opacity: .5; cursor: default; }

    .hint {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* ── VNC canvas ── */
    #screen {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    #screen canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <!-- Chrome-like icon -->
  <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="24" fill="#fff"/>
    <circle cx="24" cy="24" r="10" fill="#4285F4"/>
    <path d="M24 14h19.4A24 24 0 0 0 4.6 14H24Z" fill="#EA4335"/>
    <path d="M4.6 14A24 24 0 0 0 14.3 42.4L24 24Z" fill="#34A853"/>
    <path d="M43.4 14H24L33.7 42.4A24 24 0 0 0 43.4 14Z" fill="#FBBC05"/>
    <circle cx="24" cy="24" r="8" fill="#fff"/>
    <circle cx="24" cy="24" r="6" fill="#4285F4"/>
  </svg>
  <span id="title">Chrome Remote Browser</span>
  <div class="spacer"></div>
  <div id="status-dot"></div>
  <span id="status-text">Nicht verbunden</span>
  <button id="btn-settings">Verbindung</button>
</div>

<div id="screen">
  <div id="overlay">
    <div class="card">
      <h1>
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="24" fill="#fff"/>
          <circle cx="24" cy="24" r="10" fill="#4285F4"/>
          <path d="M24 14h19.4A24 24 0 0 0 4.6 14H24Z" fill="#EA4335"/>
          <path d="M4.6 14A24 24 0 0 0 14.3 42.4L24 24Z" fill="#34A853"/>
          <path d="M43.4 14H24L33.7 42.4A24 24 0 0 0 43.4 14Z" fill="#FBBC05"/>
          <circle cx="24" cy="24" r="8" fill="#fff"/>
          <circle cx="24" cy="24" r="6" fill="#4285F4"/>
        </svg>
        Chrome Remote Browser
      </h1>

      <div class="row">
        <div class="field">
          <label>Server-Host / IP</label>
          <input id="inp-host" type="text" value="localhost" placeholder="192.168.1.100" />
        </div>
        <div class="field" style="max-width:100px">
          <label>WebSocket-Port</label>
          <input id="inp-port" type="number" value="6080" min="1" max="65535" />
        </div>
      </div>

      <div class="field">
        <label>VNC-Passwort (optional)</label>
        <input id="inp-pass" type="password" placeholder="Leer lassen falls keines gesetzt" />
      </div>

      <button id="btn-connect">Verbinden</button>

      <p class="hint">
        Starte den Docker-Container auf deinem Server:<br>
        <code style="background:var(--bg);padding:4px 8px;border-radius:4px;font-size:11px;display:block;margin-top:6px">
          docker compose up -d
        </code>
        Danach verbindest du dich mit <strong>Host:Port</strong> oben.
        Für lokalen Betrieb reicht <code>localhost:6080</code>.
        <br><br>
        <a href="https://github.com/roentgenjon/Chrome#readme">→ Setup-Anleitung auf GitHub</a>
      </p>
    </div>
  </div>
</div>

<script type="module">
  import RFB from 'https://cdn.jsdelivr.net/gh/novnc/noVNC@v1.4.0/core/rfb.js';

  const overlay    = document.getElementById('overlay');
  const screen     = document.getElementById('screen');
  const btnConnect = document.getElementById('btn-connect');
  const btnSettings= document.getElementById('btn-settings');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const inpHost    = document.getElementById('inp-host');
  const inpPort    = document.getElementById('inp-port');
  const inpPass    = document.getElementById('inp-pass');

  let rfb = null;

  function setStatus(state, text) {
    statusDot.className = state;
    statusText.textContent = text;
  }

  function disconnect() {
    if (rfb) { try { rfb.disconnect(); } catch(_) {} rfb = null; }
  }

  function connect() {
    disconnect();
    const host = inpHost.value.trim() || 'localhost';
    const port = inpPort.value.trim() || '6080';
    const pass = inpPass.value;

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url   = `${proto}://${host}:${port}`;

    setStatus('', 'Verbinde …');
    btnConnect.disabled = true;

    try {
      rfb = new RFB(screen, url, pass ? { credentials: { password: pass } } : {});
    } catch (err) {
      setStatus('error', 'Fehler: ' + err.message);
      btnConnect.disabled = false;
      return;
    }

    rfb.scaleViewport = true;
    rfb.resizeSession = true;
    rfb.qualityLevel  = 6;

    rfb.addEventListener('connect', () => {
      overlay.style.display = 'none';
      setStatus('connected', `Verbunden mit ${host}:${port}`);
      btnConnect.disabled = false;
    });

    rfb.addEventListener('disconnect', (e) => {
      overlay.style.display = 'flex';
      setStatus('error', e.detail.clean ? 'Getrennt' : 'Verbindung unterbrochen');
      btnConnect.disabled = false;
      rfb = null;
    });

    rfb.addEventListener('credentialsrequired', () => {
      const pw = prompt('VNC-Passwort:');
      if (pw !== null) rfb.sendCredentials({ password: pw });
      else { disconnect(); setStatus('', 'Nicht verbunden'); btnConnect.disabled = false; }
    });
  }

  btnConnect.addEventListener('click', connect);
  btnSettings.addEventListener('click', () => { overlay.style.display = 'flex'; });

  // Auto-connect if URL params given: ?host=x&port=y&pass=z
  const params = new URLSearchParams(location.search);
  if (params.has('host')) {
    inpHost.value = params.get('host');
    if (params.has('port')) inpPort.value = params.get('port');
    if (params.has('pass')) inpPass.value = params.get('pass');
    connect();
  }
</script>
</body>
</html>
